services:
  db:
    image: postgres:15
    container_name: sportshop-db
    restart: always 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
      POSTGRES_DB: sportshop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: sportshop-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: sport@example.com
      PGADMIN_DEFAULT_PASSWORD: password
    ports:
      - "5050:80"
    depends_on:
      - db

  backend:
    build: .
    container_name: sportshop-backend
    restart: always
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=1234
      - DB_NAME=sportshop

volumes:
  postgres_data: